services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    command: python -m app.main_bot
  dashboard:
    build: .
    env_file: .env
    restart: unless-stopped
    command: streamlit run app/dashboard/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
